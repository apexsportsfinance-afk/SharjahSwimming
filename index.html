    for (let i = 0; i < bytes.length; i += 0x8000) {

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    console.error('Bundle unpack error:', err);
  }

" as=\"s\" hint-placeholder-count=\"3\">\n                          <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:flex-end;height:100%;\">\n                            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#334155;\">{{ s.time }}<\u002Fdiv>\n                            <div style=\"width:46px;border-radius:7px 7px 0 0;background:linear-gradient(180deg,#22d3ee,#0891b2);height: {{ s.h }}px;\"><\u002Fdiv>\n                            <div style=\"font-size:12px;color:#64748b;font-weight:600;\">{{ s.label }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- LEVELS -->\n          <sc-if value=\"{{ isLevels }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"animation:floatUp .4s ease both;\">\n              <div style=\"font-size:14px;color:#64748b;margin-bottom:18px;max-width:640px;\">The programme's four-stage pathway. Athletes are assessed each cycle and promoted as they meet the criteria for the next level.<\u002Fdiv>\n              <div data-levelgrid=\"\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n                <sc-for list=\"{{ levelCards }}\" as=\"l\" hint-placeholder-count=\"4\">\n                  <div style=\"background:#fff;border:1px solid #e7edf3;border-radius:16px;overflow:hidden;\">\n                    <div style=\"height:6px;background: {{ l.color }};\"><\u002Fdiv>\n                    <div style=\"padding:20px;\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;\">\n                        <div style=\"width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;background: {{ l.color }};\">{{ l.idx }}<\u002Fdiv>\n                        <div style=\"display:flex;align-items:center;gap:10px;\">\n                          <div style=\"text-align:right;\"><div style=\"font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;\">{{ l.count }}<\u002Fdiv><div style=\"font-size:11px;color:#94a3b8;\">athletes<\u002Fdiv><\u002Fdiv>\n                          <sc-if value=\"{{ l.canEdit }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ l.startEdit }}\" title=\"Edit\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#0891b2;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;\" style-hover=\"background:#f0fbfe;border-color:#0891b2;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font-size:16px;font-weight:800;margin-bottom:6px;\">{{ l.name }}<\u002Fdiv>\n\n                      <sc-if value=\"{{ l.notEditing }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div style=\"font-size:12.5px;color:#64748b;line-height:1.5;margin-bottom:14px;\">{{ l.desc }}<\u002Fdiv>\n                        <div style=\"background:#f8fafc;border:1px solid #eef2f7;border-radius:9px;padding:10px 11px;\">\n                          <div style=\"font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;\">Promotion criteria<\u002Fdiv>\n                          <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                            <sc-for list=\"{{ l.criteria }}\" as=\"cr\" hint-placeholder-count=\"1\">\n                              <div style=\"display:flex;align-items:flex-start;gap:7px;font-size:12px;color:#334155;font-weight:600;\"><span style=\"color: {{ l.color }};font-weight:800;line-height:1.3;\">✓<\u002Fspan><span>{{ cr }}<\u002Fspan><\u002Fdiv>\n                            <\u002Fsc-for>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n\n                      <sc-if value=\"{{ l.editing }}\" hint-placeholder-val=\"{{ false }}\">\n                        <label style=\"display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;\">Description<\u002Flabel>\n                        <textarea value=\"{{ l.draftDesc }}\" oninput=\"{{ l.onDesc }}\" rows=\"3\" style=\"width:100%;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:12.5px;outline:none;background:#f8fafc;resize:vertical;margin-bottom:12px;\"><\u002Ftextarea>\n                        <label style=\"display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;\">Promotion criteria<\u002Flabel>\n                        <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:8px;\">\n                          <sc-for list=\"{{ l.draftCritRows }}\" as=\"cr\" hint-placeholder-count=\"1\">\n                            <div style=\"display:flex;align-items:center;gap:6px;\">\n                              <input value=\"{{ cr.val }}\" oninput=\"{{ cr.onInput }}\" placeholder=\"e.g. Swim 25m butterfly legally\" style=\"flex:1;min-width:0;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;background:#f8fafc;\">\n                              <button onclick=\"{{ cr.remove }}\" title=\"Remove\" style=\"width:26px;height:26px;flex-shrink:0;border-radius:7px;border:1px solid #e2e8f0;background:#fff;color:#94a3b8;cursor:pointer;font-size:15px;line-height:1;\" style-hover=\"border-color:#ef4444;color:#ef4444;\">×<\u002Fbutton>\n                            <\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                        <button onclick=\"{{ l.addCrit }}\" style=\"width:100%;background:#f0fbfe;color:#0891b2;border:1px dashed #a5e4f0;padding:8px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px;\">+ Add criterion<\u002Fbutton>\n                        <div style=\"display:flex;gap:8px;\">\n                          <button onclick=\"{{ l.save }}\" style=\"flex:1;background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;border:none;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;\">Save<\u002Fbutton>\n                          <button onclick=\"{{ l.cancel }}\" style=\"background:#fff;color:#64748b;border:1.5px solid #e2e8f0;padding:10px 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;\">Cancel<\u002Fbutton>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- PROFILE -->\n          <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"animation:floatUp .4s ease both;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n                <div onclick=\"{{ backProfile }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;\" style-hover=\"color:#0891b2;\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg>Back\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;\">\n                  <sc-if value=\"{{ showEditBtn }}\" hint-placeholder-val=\"{{ true }}\">\n                    <button onclick=\"{{ editThisAthlete }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#0891b2;color:#fff;border:none;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;\" style-hover=\"filter:brightness(1.08);\">\n                      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>Edit details\n                    <\u002Fbutton>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ showDeleteBtn }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button onclick=\"{{ askDeleteAthlete }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#fff;color:#dc2626;border:1.5px solid #fecaca;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;\" style-hover=\"background:#fef2f2;border-color:#dc2626;\">\n                      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6\"><\u002Fpath><path d=\"M10 11v6M14 11v6\"><\u002Fpath><\u002Fsvg>Delete\n                    <\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ deleteModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;\">\n                  <div style=\"background:#fff;border-radius:18px;max-width:440px;width:100%;padding:26px 26px 22px;box-shadow:0 30px 70px -20px rgba(15,23,42,.5);\">\n                    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\">\n                      <div style=\"width:44px;height:44px;border-radius:12px;background:#fef2f2;color:#dc2626;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                      <div style=\"font-size:18px;font-weight:800;color:#0f172a;\">Delete athlete<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:13.5px;color:#475569;line-height:1.55;margin-bottom:16px;\">This permanently removes <b>{{ deleteAthleteName }}<\u002Fb> along with all their times, attendance, and results. This cannot be undone.<\u002Fdiv>\n                    <div style=\"font-size:12.5px;font-weight:700;color:#64748b;margin-bottom:6px;\">Type <b style=\"color:#0f172a;\">{{ deleteAthleteName }}<\u002Fb> to confirm<\u002Fdiv>\n                    <input value=\"{{ deleteConfirmText }}\" oninput=\"{{ onDeleteConfirmInput }}\" placeholder=\"Athlete name\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;background:#fff;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:18px;\">\n                    <div style=\"display:flex;gap:10px;justify-content:flex-end;\">\n                      <button onclick=\"{{ cancelDeleteAthlete }}\" style=\"background:#fff;border:1.5px solid #e2e8f0;color:#475569;padding:10px 20px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;\" style-hover=\"background:#f8fafc;\">Cancel<\u002Fbutton>\n                      <button onclick=\"{{ confirmDeleteAthlete }}\" disabled=\"{{ deleteBusy }}\" style=\"background: {{ deleteBtnBg }};color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13.5px;font-weight:800;cursor:pointer;\">Delete permanently<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ profileEditing }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#fff;border:1px solid #e7edf3;border-radius:16px;padding:26px 28px;margin-bottom:16px;animation:floatUp .3s ease both;\">\n                  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px;\">\n                    <div style=\"width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center;\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                    <div><div style=\"font-size:17px;font-weight:800;\">Edit Athlete<\u002Fdiv><div style=\"font-size:12.5px;color:#94a3b8;\">Update details and save without leaving this profile<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"height:1px;background:#eef2f7;margin:18px 0 22px;\"><\u002Fdiv>\n                  <div data-form2=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;\">\n                  <div style=\"grid-column:span 2;display:flex;align-items:center;gap:16px;\">\n                    <div style=\"width:64px;height:64px;border-radius:16px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#e0f2fe;color:#0369a1;font-weight:800;font-size:20px;border:1.5px solid #e2e8f0;\">\n                      <sc-if value=\"{{ hasRegPhoto }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ regPhotoUrl }}\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;\"><\u002Fsc-if>\n                      <sc-if value=\"{{ noRegPhoto }}\" hint-placeholder-val=\"{{ true }}\">{{ regPhotoInitials }}<\u002Fsc-if>\n                    <\u002Fdiv>\n                    <div>\n                      <div style=\"font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Photo <span style=\"color:#94a3b8;font-weight:500;\">· optional<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:flex;gap:8px;\">\n                        <label style=\"cursor:pointer;font-size:13px;font-weight:700;color:#fff;background:#0891b2;padding:8px 14px;border-radius:9px;display:inline-flex;align-items:center;gap:7px;\" style-hover=\"filter:brightness(1.06);\">\n                          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"3.2\"><\u002Fcircle><\u002Fsvg>\n                          <sc-if value=\"{{ photoIdle }}\" hint-placeholder-val=\"{{ true }}\">Upload photo<\u002Fsc-if>\n                          <sc-if value=\"{{ photoUploading }}\" hint-placeholder-val=\"{{ false }}\">Uploading…<\u002Fsc-if>\n                          <input type=\"file\" accept=\"image/*\" onchange=\"{{ onRegPhoto }}\" style=\"display:none;\">\n                        <\u002Flabel>\n                        <sc-if value=\"{{ hasRegPhoto }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ removeRegPhoto }}\" type=\"button\" style=\"font-size:13px;font-weight:700;color:#64748b;background:#fff;border:1.5px solid #e2e8f0;padding:8px 14px;border-radius:9px;cursor:pointer;\" style-hover=\"border-color:#ef4444;color:#ef4444;\">Remove<\u002Fbutton><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                    <div style=\"grid-column:span 2;\"><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Full Name *<\u002Flabel><input value=\"{{ reg.name }}\" oninput=\"{{ onRegName }}\" placeholder=\"e.g. Ahmed Al Marri\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><\u002Fdiv>\n                    <div style=\"grid-column:span 2;\"><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Guardian Name<\u002Flabel><input value=\"{{ reg.father }}\" oninput=\"{{ onRegFather }}\" placeholder=\"e.g. Khalid Al Marri\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Date of Birth *<\u002Flabel><input type=\"date\" value=\"{{ reg.dob }}\" oninput=\"{{ onRegDob }}\" style=\"width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><div style=\"font-size:11.5px;color:#0891b2;font-weight:700;margin-top:5px;\">{{ regAgePreview }}<\u002Fdiv><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Gender<\u002Flabel><select value=\"{{ reg.gender }}\" onchange=\"{{ onRegGender }}\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><option>Male<\u002Foption><option>Female<\u002Foption><\u002Fselect><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Current Level<\u002Flabel><select value=\"{{ reg.level }}\" onchange=\"{{ onRegLevel }}\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><sc-for list=\"{{ levelOptions }}\" as=\"l\" hint-placeholder-count=\"4\"><option value=\"{{ l }}\">{{ l }}<\u002Foption><\u002Fsc-for><\u002Fselect><div style=\"font-size:11px;color:#94a3b8;margin-top:5px;\">Changing this promotes the athlete — starting level stays fixed.<\u002Fdiv><\u002Fdiv>\n                    <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Training Site<\u002Flabel><select value=\"{{ reg.site }}\" onchange=\"{{ onRegSite }}\" style=\"width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\"><sc-for list=\"{{ regSites }}\" as=\"s\" hint-placeholder-count=\"5\"><option value=\"{{ s }}\">{{ s }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n                    <div style=\"grid-column:span 2;\">\n                      <label style=\"display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:6px;\">Events <span style=\"color:#94a3b8;font-weight:500;\">· determined by the selected level<\u002Fspan><\u002Flabel>\n                      <sc-if value=\"{{ regNoEvents }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div style=\"border:1.5px dashed #cbd5e1;border-radius:10px;background:#f8fafc;padding:16px 18px;font-size:13px;color:#64748b;display:flex;align-items:center;gap:10px;\">\n                          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v5M12 16h.01\"><\u002Fpath><\u002Fsvg>\n                          No events are le=\"Time mandatory\" style=\"font-size:11px;font-weight:700;color:#ef4444;min-width:44px;text-align:center;\">★ req<\u002Fspan>\n                                <\u002Fsc-if>\n                                <sc-if value=\"{{ e.optional }}\" hint-placeholder-val=\"{{ false }}\">\n                                  <button onclick=\"{{ e.remove }}\" title=\"Remove\" style=\"width:28px;height:28px;border-radius:50%;border:1px solid #e2e8f0;background:#fff;color:#94a3b8;cursor:pointer;font-size:15px;line-height:1;\" style-hover=\"border-color:#ef4444;color:#ef4444;\">×<\u002Fbutton>\n                                <\u002Fsc-if>\n                              <\u002Fdiv>\n                            <\u002Fsc-for>\n                          <\u002Fdiv>\n                          <sc-if value=\"{{ regHasOptional }}\" hint-placeholder-val=\"{{ false }}\">\n                            <div style=\"margin-top:11px;padding-top:11px;border-top:1px dashed #e2e8f0;\">\n                              <div style=\"font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;\">Add optional events<\u002Fdiv>\n                              <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                                <sc-for list=\"{{ regOptionalAvail }}\" as=\"e\" hint-placeholder-count=\"2\">\n                                  <button onclick=\"{{ e.add }}\" style=\"display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #e2e8f0;color:#475569;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;\" style-hover=\"border-color:#0891b2;color:#0891b2;background:#f0fbfe;\"><span style=\"font-weight:800;color:#0891b2;\">+<\u002Fspan>{{ e.label }}<\u002Fbutton>\n                                <\u002Fsc-for>\n                              <\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ hasRegErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:16px;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;\">{{ regErr }}<\u002Fdiv><\u002Fsc-if>\n                  <div style=\"display:flex;justify-content:flex-end;gap:12px;margin-top:24px;\">\n                    <button onclick=\"{{ cancelRegEdit }}\" style=\"background:#fff;color:#64748b;border:1.5px solid #e2e8f0;padding:12px 22px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;\" style-hover=\"background:#f8fafc;\">Cancel<\u002Fbutton>\n                    <button onclick=\"{{ submitRegister }}\" style=\"background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;border:none;padding:12px 26px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;\" style-hover=\"filter:brightness(1.05);\">Save Changes<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ profileNotEditing }}\" hint-placeholder-val=\"{{ true }}\">\n              <div data-grid2=\"\" style=\"display:grid;grid-template-columns:1fr 1.5fr;gap:16px;\">\n                <div style=\"background:linear-gradient(160deg,#0b2530,#0a1220);border-radius:18px;padding:26px;color:#e2f4fb;\">\n                  <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px;\">\n                    <div style=\"width:60px;height:60px;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#0a1220;background: {{ profile.siteColor }};\"><sc-if value=\"{{ profile.hasPhoto }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ profile.photoUrl }}\" alt=\"\" style=\"width:100%;height:100%;object-fit:cover;\"><\u002Fsc-if><sc-if value=\"{{ profile.noPhoto }}\" hint-placeholder-val=\"{{ true }}\">{{ profile.initials }}<\u002Fsc-if><\u002Fdiv>\n                    <div><div style=\"font-size:20px;font-weight:800;color:#fff;\">{{ profile.name }}<\u002Fdiv><div style=\"font-size:13px;color:#7dd3e8;font-weight:600;\"><span style=\"font-family:'JetBrains Mono',monospace;\">{{ profile.regNo }}<\u002Fspan> · {{ profile.category }} · <span style=\"color:#fff;\">{{ profile.level }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;margin-bottom:20px;\">\n                    <div style=\"flex:1;text-align:center;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px 8px;\"><div style=\"width:64px;height:64px;margin:0 auto 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;background: conic-gradient(#22d3ee {{ profile.attPct }}%, rgba(255,255,255,0.08) 0);\"><div style=\"width:48px;height:48px;border-radius:50%;background:#0b2530;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'JetBrains Mono',monospace;\">{{ profile.attPct }}%<\u002Fdiv><\u002Fdiv><div style=\"font-size:11.5px;color:#7dd3e8;\">Attendance<\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;text-align:center;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#e2f4fb;\">{{ profile.attCount }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7dd3e8;\">Sessions<\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;text-align:center;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;justify-content:center;\"><div style=\"font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color: {{ profile.impColor }};\">{{ profile.impDisplay }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7dd3e8;\">Improvement<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:11px;font-size:13px;\">\n                    <div style=\"display:flex;justify-content:space-between;\"><span style=\"color:#5f93a6;\">Age / Sex<\u002Fspan><span style=\"font-weight:600;color:#e2f4fb;\">{{ profile.age }} · {{ profile.gender }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;justify-content:space-between;\"><span style=\"color:#5f93a6;\">DOB<\u002Fspan><span style=\"font-weight:600;color:#e2f4fb;font-family:'JetBrains Mono',monospace;\">{{ profile.dob }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;justify-content:space-between;\"><span style=\"color:#5f93a6;\">Site<\u002Fspan><span style=\"font-weight:600;color:#e2f4fb;\">{{ profile.site }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;flex-direction:column;gap:16px;\">\n                  <div style=\"display:flex;gap:16px;\">\n                    <div style=\"flex:1;background:#fff;border:1px solid #e7edf3;border-radius:14px;padding:18px;\"><div style=\"font-size:12px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;\">Starting Level<\u002Fdiv><div style=\"display:flex;align-items:center;gap:8px;margin-top:8px;\"><span style=\"width:12px;height:12px;border-radius:4px;background: {{ profile.startLevelColor }};\"><\u002Fspan><span style=\"font-size:17px;font-weight:800;color:#475569;\">{{ profile.startLevel }}<\u002Fspan><\u002Fdiv><div style=\"font-size:12px;color:#94a3b8;margin-top:4px;\">frozen at registration<\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;background:#fff;border:1px solid #e7edf3;border-radius:14px;padding:18px;\"><div style=\"font-size:12px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;\">Current Level<\u002Fdiv><div style=\"display:flex;align-items:center;gap:8px;margin-top:8px;\"><span style=\"width:12px;height:12px;border-radius:4px;background: {{ profile.levelColor }};\"><\u002Fspan><span style=\"font-size:17px;font-weight:800;\">{{ profile.level }}<\u002Fspan><\u002Fdiv><sc-if value=\"{{ profilePromoted }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#10b981;font-weight:700;margin-top:4px;\">▲ promoted from {{ profile.startLevel }}<\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ profileNotPromoted }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:12px;color:#94a3b8;margin-top:4px;\">no change yet<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;background:#fff;border:1px solid #e7edf3;border-radius:14px;padding:22px;\">\n                    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\"><div style=\"font-size:14.5px;font-weight:800;\">Times &amp; progress<\u002Fdiv><div style=\"font-size:11.5px;color:#94a3b8;\">Starting → assessments / competitions → fastest<\u002Fdiv><\u002Fdiv>\n                    <sc-if value=\"{{ profile.hasTimesTable }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"overflow-x:auto;\">\n                        <div style=\"min-width:420px;\">\n                          <div style=\"display:flex;gap:10px;padding:0 4px 9px;font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid #eef2f7;\">\n                            <div style=\"flex:2;min-width:110px;\">Event<\u002Fdiv>\n                            <div style=\"flex:1;text-align:right;min-width:64px;\">Starting<\u002Fdiv>\n                            <sc-for list=\"{{ profile.roundCols }}\" as=\"rc\" hint-placeholder-count=\"1\"><div style=\"flex:1;text-align:right;min-width:70px;\">{{ rc.label }}<\u002Fdiv><\u002Fsc-for>\n                            <div style=\"flex:1;text-align:right;min-width:64px;color:#0891b2;\">Fastest<\u002Fdiv>\n                          <\u002Fdiv>\n                          <sc-for list=\"{{ profile.timesTable }}\" as=\"row\" hint-placeholder-count=\"5\">\n                            <div style=\"display:flex;gap:10px;padding:11px 4px;border-bottom:1px solid #f5f8fb;font-size:13px;align-items:center;\">\n                              <div style=\"flex:2;min-width:110px;font-weight:700;color:#1e293b;\">{{ row.event }}<\u002Fdiv>\n                              <div style=\"flex:1;text-align:right;min-width:64px;font-family:'JetBrains Mono',monospace;color:#64748b;\">{{ row.start }}<\u002Fdiv>\n                              <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"1\"><div style=\"flex:1;text-align:right;min-width:70px;font-family:'JetBrains Mono',monospace;color:#475569;\">{{ cell.val }}<\u002Fdiv><\u002Fsc-for>\n                              <div style=\"flex:1;text-align:right;min-width:64px;font-family:'JetBrains Mono',monospace;font-weight:800;color:#0891b2;\">{{ row.fastest }}<\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ profile.noTimesTable }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"border:1.5px dashed #cbd5e1;border-radius:10px;background:#f8fafc;padding:22px;text-align:center;font-size:13px;color:#64748b;\">No times recorded yet. Register times or use <b style=\"color:#0891b2;\">Upload Times<\u002Fb> to add assessment / competition results.<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- UPLOAD TIMES -->\n          <sc-if value=\"{{ isUploadTimes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"animation:floatUp .4s ease both;max-width:820px;\">\n              <div style=\"background:#fff;border:1px solid #e7edf3;border-radius:16px;padding:26px 28px;\">\n                <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px;\">\n                  <div style=\"width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15V3M8 7l4-4 4 4M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div><div style=\"font-size:17px;font-weight:800;\">Upload Times<\u002Fdiv><div style=\"font-size:13px;color:#94a3b8;\">Import assessment or competition times for existing athletes<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:1px;background:#eef2f7;margin:18px 0 22px;\"><\u002Fdiv>\n\n                <label style=\"display:block;font-size:12.5px;font-weight:700;color:#475569;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;\">1 · Pick the round these times belong to<\u002Flabel>\n                <sc-if value=\"{{ hasRounds }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px;\">\n                    <sc-for list=\"{{ roundOptions }}\" as=\"r\" hint-placeholder-count=\"3\">\n                      <div style=\"display:inline-flex;align-items:center;border-radius:11px;border:1.5px solid {{ r.bd }};background: {{ r.bg }};overflow:hidden;\">\n                        <button onclick=\"{{ r.select }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:transparent;color: {{ r.fg }};\"><span style=\"width:8px;height:8px;border-radius:3px;background: {{ r.dot }};\"><\u002Fspan>{{ r.label }}<\u002Fbutton>\n                        <button onclick=\"{{ r.remove }}\" title=\"Delete round\" style=\"border:none;background:transparent;color: {{ r.fg }};opacity:0.7;cursor:pointer;padding:10px 11px 10px 4px;font-size:15px;line-height:1;\">×<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noRounds }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border:1.5px dashed #cbd5e1;border-radius:10px;background:#f8fafc;padding:14px 16px;font-size:13px;color:#64748b;margin-bottom:14px;\">No rounds yet — add your first below (e.g. “Assessment 1”, “Sharjah Open 2026”).<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;\">\n                  <input value=\"{{ newRoundName }}\" oninput=\"{{ onNewRoundName }}\" placeholder=\"New round name…\" style=\"flex:1;min-width:180px;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;\">\n                  <div style=\"display:flex;border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;\">\n                    <button onclick=\"{{ setKindAssess }}\" style=\"border:none;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:700;background: {{ kindAssessBg }};color: {{ kindAssessFg }};\">Assessment<\u002Fbutton>\n                    <button onclick=\"{{ setKindComp }}\" style=\"border:none;cursor:pointer;padding:9px 14px;font-size:13px;font-weight:700;background: {{ kindCompBg }};color: {{ kindCompFg }};\">Competition<\u002Fbutton>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ addRound }}\" style=\"background:#0f172a;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;\">+ Add round<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hasRoundErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:8px 12px;border-radius:9px;font-size:12.5px;font-weight:600;margin-bottom:8px;\">{{ roundErr }}<\u002Fdiv><\u002Fsc-if>\n                <div style=\"font-size:11.5px;color:#94a3b8;margin-bottom:22px;\">Each round becomes a column on every athlete profile. Keep it to your total set of assessments &amp; competitions (up to 8).<\u002Fdiv>\n\n                <label style=\"display:block;font-size:12.5px;font-weight:700;color:#475569;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;\">2 · Upload the file<\u002Flabel>\n                <div style=\"border:1.5px dashed #cbd5e1;border-radius:14px;background:#f8fafc;padding:26px 22px;text-align:center;\">\n                  <div style=\"font-size:13.5px;color:#475569;font-weight:600;margin-bottom:4px;\">Drop or choose a <b>PDF<\u002Fb>, <b>HTML<\u002Fb>, <b>Excel<\u002Fb> or <b>CSV<\u002Fb> file<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#94a3b8;margin-bottom:16px;\">Times will be saved to <b style=\"color:#0891b2;\">{{ uploadRoundLabel }}<\u002Fb>. Athletes are matched by Registration Number (or full name).<\u002Fdiv>\n                  <label style=\"cursor:pointer;font-size:13.5px;font-weight:700;color:#fff;background:linear-gradient(135deg,#06b6d4,#0891b2);padding:11px 24px;border-radius:11px;display:inline-flex;align-items:center;gap:8px;\" style-hover=\"filter:brightness(1.06);\">\n                    <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15V3M8 7l4-4 4 4M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4\"><\u002Fpath><\u002Fsvg>Choose file\n                    <input type=\"file\" accept=\".csv,.xlsx,.xls,.pdf,.html,.h
