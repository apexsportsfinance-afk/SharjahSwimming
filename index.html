document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r.srVal }}\" oninput=\"{{ r.onSr }}\" placeholder=\"mm:ss.ss\" style=\"width:120px;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;background:#f8fafc;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- LEVEL SETUP -->\n          <sc-if value=\"{{ isLevelSetup }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"animation:floatUp .4s ease both;\">\n              <div style=\"background:linear-gradient(135deg,#eff6ff,#f0fbfe);border:1px solid #cde9f5;border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0891b2\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v5M12 16h.01\"><\u002Fpath><\u002Fsvg>\n                <div style=\"font-size:13px;color:#475569;\">Choose which events each level competes in, whether an event is <b>required<\u002Fb> (auto-added) or <b>optional<\u002Fb> (coach can add it), and whether a <b>time is mandatory<\u002Fb> or <b>NA is allowed<\u002Fb>. Changes apply instantly to the registration form.<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;\">\n                <sc-for list=\"{{ setupTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ t.go }}\" style=\"cursor:pointer;padding:9px 18px;border-radius:10px;font-size:13.5px;font-weight:700;border:1.5px solid {{ t.tabBd }};background: {{ t.tabBg }};color: {{ t.tabFg }};display:flex;align-items:center;gap:8px;\"><span style=\"width:10px;height:10px;border-radius:3px;background: {{ t.color }};\"><\u002Fspan>{{ t.name }}<\u002Fbutton>\n                < ct value=\"{{ e.timeVal }}\" onchange=\"{{ e.onTime }}\" style=\"width:100%;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-weight:600;outline:none;background:#fff;\">\n                          <option value=\"required\">Time mandatory<\u002Foption>\n                          <option value=\"na\">NA allowed<\u002Foption>\n                        <\u002Fselect>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ e.notOffered }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"font-size:12.5px;color:#cbd5e1;font-weight:600;\">—<\u002Fspan>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- more-views -->\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TOAST -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#0b1626;color:#fff;padding:13px 22px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,0.3);z-index:100;display:flex;align-items:center;gap:10px;animation:floatUp .3s ease both;\">\n      <span style=\"width:20px;height:20px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>{{ toast }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.SITES = [\n      {name:'Wasit Youth Center', short:'Wasit', color:'#0891b2'},\n      {name:'Al Dhaid Youth Centre', short:'Al Dhaid', color:'#f59e0b'},\n      {name:'Mleiha Youth Center', short:'Mleiha', color:'#8b5cf6'},\n      {name:'Al Mudam Youth Center', short:'Al Mudam', color:'#10b981'},\n      {name:'Al Thameed Youth Center', short:'Al Thameed', color:'#ef4444'},\n      {name:'Kalba Youth Center', short:'Kalba', color:'#3b82f6'},\n      {name:'Khorfakkan Youth Center', short:'Khorfakkan', color:'#ec4899'},\n      {name:'Dibba Al Hisn Youth Center', short:'Dibba Al Hisn', color:'#14b8a6'}\n    ];\n    this.LEVELS = [\n      {name:'Beginners A', color:'#38bdf8'},\n      {name:'Beginners B', color:'#0891b2'},\n      {name:'Intermediate', color:'#f59e0b'},\n      {name:'Advance', color:'#8b5cf6'}\n    ];\n    this.EVENTS = [\n      {id:'f25',label:'25m Freestyle',stroke:'Freestyle',dist:'25m',rec:15.9},\n      {id:'b25',label:'25m Backstroke',stroke:'Backstroke',dist:'25m',rec:18.8},\n      {id:'br25',label:'25m Breaststroke',stroke:'Breaststroke',dist:'25m',rec:20.4},\n      {id:'fly25',label:'25m Butterfly',stroke:'Butterfly',dist:'25m',rec:16.8},\n      {id:'f50',label:'50m Freestyle',stroke:'Freestyle',dist:'50m',rec:25.4},\n      {id:'b50',label:'50m Backstroke',stroke:'Backstroke',dist:'50m',rec:29.6},\n      {id:'br50',label:'50m Breaststroke',stroke:'Breaststroke',dist:'50m',rec:33.1},\n      {id:'fly50',label:'50m Butterfly',stroke:'Butterfly',dist:'50m',rec:27.3},\n      {id:'f100',label:'100m Freestyle',stroke:'Freestyle',dist:'100m',rec:56.2},\n      {id:'b100',label:'100m Backstroke',stroke:'Backstroke',dist:'100m',rec:64.5},\n      {id:'br100',label:'100m Breaststroke',stroke:'Breaststroke',dist:'100m',rec:72.6},\n      {id:'fly100',label:'100m Butterfly',stroke:'Butterfly',dist:'100m',rec:60.1},\n      {id:'im100',label:'100m Individual Medley',stroke:'IM',dist:'100m',rec:67.0},\n      {id:'f200',label:'200m Freestyle',stroke:'Freestyle',dist:'200m',rec:118.0},\n      {id:'im200',label:'200m Individual Medley',stroke:'IM',dist:'200m',rec:148.5}\n    ];\n    // Per-level event allocation. sel:'required'|'optional', time:'required'|'na'. Absent = not offered at that level.\n    this.LEVEL_RULES = {\n      'Beginners A': {},\n      'Beginners B': { f25:{sel:'required',time:'required'}, b25:{sel:'required',time:'na'}, br25:{sel:'required',time:'na'}, fly25:{sel:'required',time:'na'} },\n      'Intermediate': { f25:{sel:'required',time:'required'}, b25:{sel:'required',time:'required'}, br25:{sel:'required',time:'required'}, fly25:{sel:'optional',time:'na'}, f50:{sel:'required',time:'required'}, b50:{sel:'required',time:'na'}, br50:{sel:'required',time:'na'}, fly50:{sel:'required',time:'na'}, f100:{sel:'optional',time:'na'}, im100:{sel:'optional',time:'na'} },\n      'Advance': { f25:{sel:'required',time:'required'}, b25:{sel:'required',time:'required'}, br25:{sel:'required',time:'required'}, fly25:{sel:'required',time:'required'}, f50:{sel:'required',time:'required'}, b50:{sel:'required',time:'required'}, br50:{sel:'required',time:'required'}, fly50:{sel:'required',time:'na'}, f100:{sel:'required',time:'required'}, im100:{sel:'required',time:'required'}, f200:{sel:'optional',time:'na'}, im200:{sel:'optional',time:'na'} }\n    };\n    this.USERS = [\n      {id:'rashid',name:'Coach Rashid Al Marri',email:'rashid@sharjahyouth.ae',role:'superadmin',roleLabel:'Super Admin',scope:'All clubs · full control',site:null,color:'#0891b2',initials:'RM'},\n      {id:'layla',name:'Coach Layla Al Suwaidi',email:'layla@sharjahyouth.ae',role:'admin',roleLabel:'Club Admin',scope:'Wasit Youth Center',site:'Wasit Youth Center',color:'#8b5cf6',initials:'LS'},\n      {id:'omar',name:'Coach Omar Al Nuaimi',email:'omar@sharjahyouth.ae',role:'admin',roleLabel:'Club Admin',scope:'Mleiha Youth Center',site:'Mleiha Youth Center',color:'#f59e0b',initials:'ON'},\n      {id:'board',name:'Board Member',email:'board@sharjahyouth.ae',role:'viewer',roleLabel:'Viewer',scope:'Read-only · all clubs',site:null,color:'#64748b',initials:'BM'}\n    ];\n    this.PALETTE=['#0891b2','#f59e0b','#8b5cf6','#10b981','#ef4444','#3b82f6','#ec4899','#14b8a6','#6366f1','#f97316'];\n    this.customEvents = [];\n    this.athletes = [];\n    this.state = {\n      authed:false, role:null, user:null, route:'dashboard',\n      siteFilter:'All Sites', loginName:'', loginPass:'',\n      regForm:this.blankForm(), selectedId:null, assessRound:'c2', assessDraft:{},\n      reportType:'attendance', reportAthlete:null, attSession:{}, toast:'', profileFrom:'students', regErr:'', loginErr:'', authing:false,\n      rankEvent:'f50', rankCat:'All', studentSearch:'',\n      clubForm:{name:'',short:''}, clubErr:'',\n      userForm:{name:'',email:'',password:'',role:'admin',site:''}, userErr:'', editingUserId:null,\n      uploadCtx:'', uploadName:'', setupLevel:'Beginners B', editAthleteId:null,\n      editLevelId:null, levelDraft:{description:'',criteria:['']}, recordDraft:{},\n      upload:{active:false,name:'',pct:0,phase:'',ctx:'',done:false}, mobileNav:false\n    };\n  }\n\n  rng(seed){ let a=seed; return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }\n\n  makeAthletes(){\n    const r = this.rng(1337);\n    const first=['Ahmed','Fatima','Omar','Layla','Yousef','Maryam','Khalid','Aisha','Saeed','Noura','Hamdan','Salma','Rashid','Hessa','Zayed','Mariam','Sultan','Latifa','Majid','Reem','Tariq','Dana','Faisal','Shaikha','Nasser','Amna','Hassan','Sara','Ali','Huda','Ibrahim','Maha','Saif','Alia','Rakan','Jana','Bilal','Lina','Adel','Rana','Kareem','Nada','Waleed','Hind'];\n    const last=['Al Marri','Al Suwaidi','Al Nuaimi','Al Falasi','Al Ketbi','Al Shamsi','Al Hosani','Al Zaabi','Al Mansoori','Al Ali','Al Qasimi','Al Naqbi'];\n    const areas=['Al Majaz','Al Khan','Al Nahda','Al Qasimia','Al Taawun','Al Layyah','Muwaileh'];\n    const out=[];\n    for(let i=0;i<44;i++){\n      const fn=first[i%first.length];\n      const ln=last[Math.floor(r()*last.length)];\n      const name=fn+' '+ln;\n      const gender = (fn.length%2===0)?'Female':'Male';\n      const site=this.SITES[Math.floor(r()*this.SITES.length)];\n      const isJunior = r()<0.55;\n      const age = isJunior ? 11+Math.floor(r()*5) : 16+Math.floor(r()*9);\n      const category = isJunior?'Junior':'Senior';\n      const ev=this.EVENTS[Math.floor(r()*this.EVENTS.length)];\n      // assessment progression (times improve => decrease)\n      const beats = r()<0.18;\n      const c2 = beats ? ev.rec*(0.955+r()*0.035) : ev.rec*(1.02+r()*0.35);\n      const c1 = c2*(1.015+r()*0.03);\n      const a1 = c1*(1.02+r()*0.05);\n      const lvlIdx = Math.min(3, Math.floor(r()*4));\n      const startIdx = Math.max(0, lvlIdx - (r()<0.4?1:0));\n      const total=40, attended=Math.round(total*(0.62+r()*0.36));\n      const dobYear = 2026-age;\n      const dob = String(1+Math.floor(r()*28)).padStart(2,'0')+'/'+String(1+Math.floor(r()*12)).padStart(2,'0')+'/'+dobYear;\n      out.push({\n        id:'A'+(1000+i), name, father:first[Math.floor(r()*first.length)]+' '+ln, age, gender,\n        site:site.name, siteShort:site.short, siteColor:site.color, category,\n        level:this.LEVELS[lvlIdx].name, startLevel:this.LEVELS[startIdx].name,\n        address:'Villa '+(10+Math.floor(r()*180))+', '+areas[Math.floor(r()*areas.length)]+', Sharjah',\n        primaryEvent:ev.id, primaryLabel:ev.label, dob,\n        a1, c1, c2, times:{[ev.id]:c2},\n        attended, total, beats\n      });\n    }\n    return out;\n  }\n\n  blankForm(){ return {name:'',father:'',dob:'',gender:'Male',level:'Beginners A',address:'',site:this.SITES[0].name,optionalOn:{},times:{},na:{}}; }\n  allEvents(){ return this.EVENTS.concat(this.customEvents); }\n  levelActiveEvents(level){ const rules=this.LEVEL_RULES[level]||{}; return this.EVENTS.filter(e=>rules[e.id]); }\n  setRegLevel(v){ this.setState(st=>({regForm:{...s
